services:
  app:
    build: .
    image: super-auto-pack-builder
    user: "${DOCKER_UID}:${DOCKER_GID}"
    volumes:
      - .:/app
  hadolint:
    image: hadolint/hadolint
    user: "${DOCKER_UID}:${DOCKER_GID}"
    volumes:
      - .:/app
    working_dir: /app
  playwright:
    image: super-auto-e2e-tests
    build:
      context: .
      dockerfile: Dockerfile.e2e
    user: "${DOCKER_UID}:${DOCKER_GID}"
    volumes:
      - .:/app
    working_dir: /app
    command: tail -f /dev/null